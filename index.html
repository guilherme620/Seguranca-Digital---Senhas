<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de senha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="conteudo">
        <div class="conteudo-titulo">
            <img src="unlock.svg" alt="Ícone de cadeado" id="cadeado" class="titulo-icone">
            <h2 class="titulo-principal">Gerador de senhas</h2>
            <h3 class="titulo-secundario">Gere instantaneamente uma senha aleatória e segura</h3>
        </div>

        <div class="conteudo-senha">
            <label for="campo-senha">Senha</label>
            <div class="senha-wrapper">
                <input name="senha" type="text" id="campo-senha" readonly>
                <button type="button" id="botao-copiar" class="botao-copiar">Copiar</button>
            </div>
            <button type="button" id="botao-gerar" class="botao-gerar">Gerar senha</button>
        </div>

        <div class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
            <div class="parametro-coluna__senha">
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Número de caracteres</h4>
                    <div class="parametro-senha-botoes">
                        <button type="button" class="parametro-senha__botao" id="diminuir">-</button>
                        <p class="parametro-senha__texto" id="tamanho-senha">12</p>
                        <button type="button" class="parametro-senha__botao" id="aumentar">+</button>
                    </div>
                </div>

                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Características da senha</h4>
                    <div class="parametro-senha-checkbox">
                        <input id="maiusculo" name="maiusculo" type="checkbox" class="checkbox" checked>
                        <label for="maiusculo">Letras maiúsculas</label>
                    </div>
                    <div class="parametro-senha-checkbox">
                        <input id="minusculo" name="minusculo" type="checkbox" class="checkbox" checked>
                        <label for="minusculo">Letras minúsculas</label>
                    </div>
                    <div class="parametro-senha-checkbox">
                        <input id="numero" name="numero" type="checkbox" class="checkbox" checked>
                        <label for="numero">Números</label>
                    </div>
                    <div class="parametro-senha-checkbox">
                        <input id="simbolo" name="simbolo" type="checkbox" class="checkbox">
                        <label for="simbolo">Símbolos</label>
                    </div>
                </div>

                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Força da senha</h4>
                    <div class="barra">
                        <div class="forca" id="barra-forca"></div>
                    </div>
                    <p class="forca-texto" id="texto-forca">Fraca</p>
                    <div class="parametro-senha-textos">
                        <p>Fraca</p>
                        <p>Média</p>
                        <p>Forte</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="main.js"></script>
</body>

</html>
